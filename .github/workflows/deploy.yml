name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd backend
          pip install pytest
          pytest tests/ || true

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend/
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: [self-hosted, Linux, X64]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: /tmp/backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: /tmp/frontend

      - name: Deploy backend
        run: |
          ssh -o StrictHostKeyChecking=no -p 32553 root@${{ secrets.SERVER_HOST }} "
            # 备份当前版本
            cp -r /opt/etf-dashboard/backend /opt/etf-dashboard/backend.bak

            # 部署新版本
            rm -rf /opt/etf-dashboard/backend
            cp -r /tmp/backend /opt/etf-dashboard/backend

            # 重启服务
            pkill -f gunicorn || true
            sleep 2
            cd /opt/etf-dashboard/backend
            source venv/bin/activate
            nohup gunicorn -w 2 -b 127.0.0.1:8000 'wsgi:app' > /tmp/gunicorn.log 2>&1 &
            sleep 3

            # 检查服务状态
            curl -s http://127.0.0.1:8000/health || echo 'Service check failed'
          "

      - name: Deploy frontend
        run: |
          ssh -o StrictHostKeyChecking=no -p 32553 root@${{ secrets.SERVER_HOST }} "
            rm -rf /opt/etf-dashboard/frontend/dist
            cp -r /tmp/frontend /opt/etf-dashboard/frontend/dist
            echo 'Frontend deployed'
          "

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://${{ secrets.DOMAIN }}/api/health || exit 1
          echo "Deployment verified successfully"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ESLint
        run: |
          cd frontend
          npm ci
          npm run lint || true
