name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Deploy to server
        run: |
          # 备份当前版本
          cp -r /opt/etf-dashboard/backend /opt/etf-dashboard/backend.bak 2>/dev/null || true
          cp -r /opt/etf-dashboard/frontend/dist /opt/etf-dashboard/frontend/dist.bak 2>/dev/null || true

          # 复制新版本
          cp -r backend /opt/etf-dashboard/
          cp -r frontend/dist /opt/etf-dashboard/frontend/

          # 重启后端服务
          pkill -f gunicorn || true
          sleep 2
          cd /opt/etf-dashboard/backend
          source venv/bin/activate
          nohup gunicorn -w 2 -b 127.0.0.1:8000 'wsgi:app' > /tmp/gunicorn.log 2>&1 &
          sleep 3

      - name: Verify deployment
        run: |
          curl -sf https://bedivere.space/api/health || exit 1
          echo "Deployment verified successfully"

  lint:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint || true
