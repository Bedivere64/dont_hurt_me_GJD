<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>300ETF(510300) vs 上证指数</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; padding: 20px; color: #fff; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; background: linear-gradient(90deg, #00d4ff, #7b2cbf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
        .box { background: rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; text-align: center; }
        .box h3 { font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        .box .value { font-size: 28px; font-weight: 600; }
        .box .sub { font-size: 12px; color: #666; margin-top: 4px; }
        .up { color: #00d4ff; }
        .down { color: #ff4757; }
        .chart { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .chart h3 { margin-bottom: 12px; color: #888; font-size: 12px; text-transform: uppercase; }
        #c1, #c2 { width: 100%; height: 300px; }
        .footer { text-align: center; color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>300ETF (510300) vs 上证指数 对比</h1></div>

        <div class="stats">
            <div class="box">
                <h3>300ETF 最新份额</h3>
                <div class="value">316.62<span style="font-size:14px"> 亿</span></div>
                <div class="sub">2026-05-19</div>
            </div>
            <div class="box">
                <h3>300ETF 累计涨跌</h3>
                <div class="value down">-26.06%</div>
                <div class="sub">2026-04-20 ~ 2026-05-19</div>
            </div>
            <div class="box">
                <h3>上证指数 点位</h3>
                <div class="value">4122.96</div>
                <div class="sub">2026-05-19</div>
            </div>
            <div class="box">
                <h3>上证指数 累计涨跌</h3>
                <div class="value up">+1.72%</div>
                <div class="sub">同期对比</div>
            </div>
        </div>

        <div class="chart">
            <h3>累计涨跌幅对比</h3>
            <div id="c1"></div>
        </div>

        <div class="chart">
            <h3>300ETF 份额趋势</h3>
            <div id="c2"></div>
        </div>

        <div class="footer">数据来源: SSE + 腾讯财经 | 2026-05-20 09:45</div>
    </div>
    <script>
        var c1 = echarts.init(document.getElementById('c1'));
        var c2 = echarts.init(document.getElementById('c2'));
        var dates = ["2026-04-20", "2026-04-21", "2026-04-22", "2026-04-23", "2026-04-24", "2026-04-27", "2026-04-28", "2026-04-29", "2026-04-30", "2026-05-06", "2026-05-07", "2026-05-08", "2026-05-11", "2026-05-12", "2026-05-13", "2026-05-14", "2026-05-15", "2026-05-18", "2026-05-19"];
        var etfCum = [0, -0.88, -2.35, -4.02, -4.5, -5.87, -7.11, -8.34, -11.3, -12.01, -16.69, -19.14, -22.89, -24.58, -26.51, -28.45, -28.23, -28.17, -29.79];
        var idxV = [4053.37, 4075.85, 4074.81, 4110.79, 4081.03, 4074.81, 4076.14, 4061.82, 4107.3, 4135.45, 4168.45, 4163.85, 4201.35, 4229.28, 4192.31, 4256.16, 4174.18, 4120.14, 4122.96];
        var etfVol = [4282068.77, 4244178.77, 4181628.77, 4111878.77, 4092258.77, 4036278.77, 3986058.77, 3937188.77, 3820458.77, 3793278.77, 3615618.77, 3526968.77, 3394578.77, 3337158.77, 3272718.77, 3209178.77, 3216288.77, 3218268.77, 3166248.77];

        c1.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + '<br/>' + p.map(x => x.seriesName + ': ' + (x.seriesName == '300ETF' ? x.value + '%' : x.value)).join('<br/>'); } },
            legend: { data: ['300ETF', '上证指数'], textStyle: { color: '#888' } },
            grid: { left: '3%', right: '4%', bottom: '15%', top: '10%' },
            xAxis: { type: 'category', data: dates, axisLabel: { color: '#666', formatter: v => v.slice(5) } },
            yAxis: [
                { type: 'value', name: 'ETF涨跌%', axisLabel: { color: '#666', formatter: v => v + '%' }, splitLine: { show: false } },
                { type: 'value', name: '上证指数', min: 3600, axisLabel: { color: '#666', formatter: v => v }}
            ],
            dataZoom: [{ type: 'inside' }, { type: 'slider', height: 20, borderColor: 'rgba(255,255,255,0.1)', backgroundColor: 'rgba(0,0,0,0.2)' }],
            series: [
                { name: '300ETF', type: 'line', yAxisIndex: 0, data: etfCum, smooth: true, symbol: 'none', itemStyle: { color: '#00d4ff' }, areaStyle: { color: 'rgba(0,212,255,0.1)' } },
                { name: '上证指数', type: 'line', yAxisIndex: 1, data: idxV, smooth: true, symbol: 'none', itemStyle: { color: '#ff6b6b' } }
            ]
        });

        c2.setOption({
            backgroundColor: 'transparent',
            tooltip: { trigger: 'axis', formatter: function(p) { return p[0].name + '<br/>' + p[0].seriesName + ': ' + (p[0].value/10000).toFixed(2) + ' 亿'; } },
            grid: { left: '3%', right: '4%', bottom: '15%', top: '10%' },
            xAxis: { type: 'category', data: dates, axisLabel: { color: '#666', formatter: v => v.slice(5) } },
            yAxis: { type: 'value', axisLabel: { color: '#666', formatter: v => (v/10000).toFixed(0) + '亿' }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } } },
            dataZoom: [{ type: 'inside' }, { type: 'slider', height: 20, borderColor: 'rgba(255,255,255,0.1)', backgroundColor: 'rgba(0,0,0,0.2)' }],
            series: [{
                name: '300ETF', type: 'line', data: etfVol,
                smooth: true, symbol: 'circle', symbolSize: 3,
                itemStyle: { color: '#00d4ff', borderWidth: 2 },
                areaStyle: { color: 'rgba(0,212,255,0.2)' },
                markPoint: { data: [{ type: 'max' }, { type: 'min' }], label: { formatter: function(p) { return (p.value/10000).toFixed(2) + '亿'; } } },
                markLine: { data: [{ type: 'average' }], label: { formatter: function(p) { return (p.value/10000).toFixed(2) + '亿'; } } }
            }]
        });

        window.addEventListener('resize', () => { c1.resize(); c2.resize(); });
    </script>
</body>
</html>
